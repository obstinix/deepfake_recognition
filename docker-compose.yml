version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./models:/app/models
      - ./backend/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - deepfake-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - deepfake-net

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: deepfake_user
      POSTGRES_PASSWORD: deepfake_pass
      POSTGRES_DB: deepfake_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deepfake_user"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - deepfake-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - deepfake-net

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - deepfake-net

volumes:
  postgres_data:

networks:
  deepfake-net:
    driver: bridge
