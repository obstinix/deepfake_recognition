apiVersion: v1
kind: Service
metadata:
  name: deepfake-backend-svc
spec:
  selector:
    app: deepfake-backend
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: deepfake-frontend-svc
spec:
  type: LoadBalancer
  selector:
    app: deepfake-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
