apiVersion: apps/v1
kind: Deployment
metadata:
  name: deepfake-backend
  labels:
    app: deepfake-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: deepfake-backend
  template:
    metadata:
      labels:
        app: deepfake-backend
    spec:
      containers:
      - name: backend
        image: obstinix/deepfake-backend:latest
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: deepfake-secrets
            optional: true
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: deepfake-frontend
  labels:
    app: deepfake-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: deepfake-frontend
  template:
    metadata:
      labels:
        app: deepfake-frontend
    spec:
      containers:
      - name: frontend
        image: obstinix/deepfake-frontend:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
