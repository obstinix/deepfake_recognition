model:
  name: resnet18
  pretrained: true
  num_classes: 2
  dropout: 0.3
  freeze_backbone_epochs: 2

data:
  root_dir: data/frames      # change this to your extracted frames path
  img_size: 224
  batch_size: 64
  num_workers: 0
  val_ratio: 0.15
  test_ratio: 0.10
  seed: 42

training:
  epochs: 1
  optimizer: adamw
  lr: 3.0e-4
  weight_decay: 1.0e-4
  scheduler: cosine
  warmup_epochs: 3
  early_stopping_patience: 8
  gradient_clip: 1.0
  mixed_precision: true
  label_smoothing: 0.05
  use_class_weights: true

logging:
  use_wandb: false          # set true if you have wandb API key
  project: deepfake-recognition
  save_top_k: 3
  checkpoint_dir: checkpoints/resnet18/

huggingface:
  repo_id: obstinix/deepfake-resnet18
  push_on_best: false       # set true after training to upload checkpoint
