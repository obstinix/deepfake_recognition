model:
  name: resnet18
  pretrained: true
  num_classes: 2
  dropout: 0.3
  freeze_backbone_epochs: 2

data:
  img_size: 224
  batch_size: 64
  num_workers: 4
  val_ratio: 0.15
  test_ratio: 0.10
  seed: 42

training:
  epochs: 50
  optimizer: adamw
  lr: 3.0e-4
  weight_decay: 1.0e-4
  scheduler: cosine_with_warmup
  warmup_epochs: 3
  early_stopping_patience: 8
  gradient_clip: 1.0
  mixed_precision: true
  label_smoothing: 0.05

logging:
  use_wandb: true
  wandb_project: deepfake-recognition
  save_top_k: 3
  checkpoint_dir: checkpoints/
